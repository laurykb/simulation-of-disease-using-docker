# nginx.conf
events {}

http {
  # Permet à Nginx de résoudre dynamiquement les conteneurs Docker
  resolver 127.0.0.11 valid=10s;

  upstream api_upstream {
    
# Docker redirige "api" vers tous les conteneurs api_* créés avec --scale
    server api:8000 resolve;
  }
# On definit le serveur Nginx qui écoute sur le port 80
#sert à faire le reverse proxy vers les conteneurs api_*
  server {
    listen 80; # On Écoute sur le port 80

    location / {
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Connection "";
    }
  }
}